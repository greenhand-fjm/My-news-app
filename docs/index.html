<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日财报与科技新闻</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📰 每日财报 & 科技新闻聚合</h1>
        <p id="update-time">加载中...</p>
        <div class="filters">
            <button class="filter-btn active" data-cat="all">全部</button>
            <button class="filter-btn" data-cat="财报">财报</button>
            <button class="filter-btn" data-cat="科技">科技</button>
            <select id="lang-filter">
                <option value="all">所有语言</option>
                <option value="zh">中文</option>
                <option value="en">英文</option>
            </select>
        </div>
    </header>
    <main id="news-container" class="news-grid">
    </main>
    <script src="script.js"></script>
</body>
</html>
